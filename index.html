<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seletor de Macros — CSI Operations</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;
    background:linear-gradient(160deg,#f5f3ff 0%,#ede9fe 40%,#f0ecff 100%);
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
    color:#1e1b4b;
  }
  .container{max-width:600px;margin:0 auto;padding:28px 16px 80px}
  .header{text-align:center;margin-bottom:28px}
  .badge{
    display:inline-flex;align-items:center;gap:8px;padding:6px 16px;
    background:rgba(124,58,237,.1);border-radius:20px;margin-bottom:10px;
  }
  .badge span{font-size:12px;font-weight:700;color:#6d28d9;letter-spacing:1px;text-transform:uppercase}
  h1{font-size:26px;font-weight:800;color:#1e1b4b;margin:6px 0 4px;line-height:1.2}
  .subtitle{font-size:14px;color:#6b7280}
  .steps{display:flex;flex-direction:column;gap:14px}
  .step-card{
    background:#fff;border-radius:16px;padding:20px 22px;
    box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid #e8e5f0;
    animation:fadeIn .3s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .step-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .step-num{
    width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;flex-shrink:0;
  }
  .step-num.pending{background:#ede5ff;color:#7c3aed}
  .step-num.done{background:#7c3aed;color:#fff}
  .step-icon{font-size:13px;color:#6b7280}
  .step-title{font-size:15px;font-weight:700;color:#1e1b4b;line-height:1.3}
  .options{display:flex;flex-direction:column;gap:8px}
  .option-btn{
    display:flex;flex-direction:column;gap:2px;padding:14px 18px;
    border:2px solid transparent;border-radius:12px;background:#f8f7fc;
    cursor:pointer;text-align:left;transition:all .2s ease;width:100%;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
  }
  .option-btn:hover{background:#f0edf7}
  .option-btn.selected{
    border-color:#7c3aed;
    background:linear-gradient(135deg,#f5f0ff,#ede5ff);
    box-shadow:0 2px 12px rgba(124,58,237,.15);
  }
  .option-label{font-size:15px;font-weight:600;color:#1e1b4b;line-height:1.3}
  .option-btn.selected .option-label{color:#6d28d9}
  .option-desc{font-size:12.5px;color:#6b7280;line-height:1.3}

  /* Multi-select checkbox */
  .option-btn .check-icon{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    width:22px;height:22px;border-radius:6px;border:2px solid #d1d5db;
    display:flex;align-items:center;justify-content:center;transition:all .2s;
    background:#fff;flex-shrink:0;
  }
  .option-btn.checked .check-icon{border-color:#7c3aed;background:#7c3aed}
  .option-btn.checked .check-icon svg{display:block}
  .option-btn .check-icon svg{display:none;width:14px;height:14px;color:#fff}
  .option-btn.multi{position:relative;padding-right:50px}
  .option-btn.multi.checked{
    border-color:#7c3aed;
    background:linear-gradient(135deg,#f5f0ff,#ede5ff);
    box-shadow:0 2px 12px rgba(124,58,237,.15);
  }
  .option-btn.multi.checked .option-label{color:#6d28d9}
  .confirm-multi-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    margin:12px auto 0;padding:12px 28px;
    background:linear-gradient(135deg,#7c3aed,#6d28d9);
    border:none;border-radius:12px;cursor:pointer;
    font-size:14px;font-weight:700;color:#fff;transition:all .2s;
    box-shadow:0 2px 12px rgba(124,58,237,.3);width:100%;
  }
  .confirm-multi-btn:hover{background:linear-gradient(135deg,#6d28d9,#5b21b6)}
  .confirm-multi-btn:disabled{opacity:.4;cursor:not-allowed}
  .multi-hint{font-size:12px;color:#7c3aed;text-align:center;margin-top:8px;font-weight:600}
  .result{
    margin-top:20px;background:#fff;border-radius:16px;padding:22px;
    box-shadow:0 4px 20px rgba(124,58,237,.12);border:2px solid #7c3aed;
    animation:fadeIn .35s ease;
  }
  .result-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
  .result-icon{
    width:36px;height:36px;border-radius:50%;background:#7c3aed;
    display:flex;align-items:center;justify-content:center;font-size:18px;
  }
  .result-title{font-size:18px;font-weight:800;color:#1e1b4b}
  .macros-list{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
  .macro-badge{
    display:flex;flex-direction:column;gap:4px;padding:14px 18px;border-radius:12px;
  }
  .macro-badge.principal{
    background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-left:4px solid #22c55e;
  }
  .macro-badge.apendice{
    background:linear-gradient(135deg,#fff7ed,#fef3c7);border-left:4px solid #f59e0b;
  }
  .macro-top{display:flex;align-items:center;gap:8px}
  .macro-type{
    font-size:11px;font-weight:800;padding:2px 8px;border-radius:6px;letter-spacing:.5px;
  }
  .macro-type.principal{background:#bbf7d0;color:#166534}
  .macro-type.apendice{background:#fde68a;color:#92400e}
  .macro-code{font-size:14px;font-weight:700;color:#1e1b4b}
  .macro-name{font-size:13px;color:#374151;line-height:1.4}
  .notes{
    background:#f8f7fc;border-radius:12px;padding:14px 16px;border-left:4px solid #a78bfa;
  }
  .notes-title{font-size:13px;font-weight:700;color:#6d28d9;margin-bottom:8px}
  .note-item{font-size:13px;color:#374151;line-height:1.5;margin-bottom:4px;padding-left:12px;position:relative}
  .note-item::before{content:"•";position:absolute;left:0;color:#a78bfa}
  .reset-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    margin:20px auto 0;padding:12px 28px;background:#fff;
    border:2px solid #d1d5db;border-radius:12px;cursor:pointer;
    font-size:14px;font-weight:600;color:#6b7280;transition:all .2s;
  }
  .reset-btn:hover{border-color:#7c3aed;color:#7c3aed}

  .macro-code-wrap{display:flex;align-items:center;gap:6px}
  .copy-btn{
    display:inline-flex;align-items:center;justify-content:center;
    width:28px;height:28px;border-radius:8px;border:1.5px solid #d1d5db;
    background:#fff;cursor:pointer;transition:all .2s;flex-shrink:0;color:#6b7280;
  }
  .copy-btn:hover{border-color:#7c3aed;color:#7c3aed;background:#f5f0ff}
  .copy-btn.copied{border-color:#22c55e;color:#22c55e;background:#f0fdf4}
  .copy-btn svg{width:14px;height:14px}

  .toast{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
    padding:10px 20px;background:#1e1b4b;color:#fff;border-radius:10px;
    font-size:13px;font-weight:600;opacity:0;transition:all .3s ease;
    pointer-events:none;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.2);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .registro-info{
    margin-top:14px;background:linear-gradient(135deg,#eff6ff,#dbeafe);
    border-radius:12px;padding:14px 16px;border-left:4px solid #3b82f6;
  }
  .registro-info .notes-title{color:#1d4ed8}
  .registro-info .note-item::before{color:#60a5fa}

  /* Script de análise */
  .script-section{
    margin-top:14px;background:#111827;border-radius:12px;padding:0;
    overflow:hidden;border:1px solid #374151;
  }
  .script-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;background:#1f2937;border-bottom:1px solid #374151;
  }
  .script-header-title{font-size:13px;font-weight:700;color:#a78bfa;display:flex;align-items:center;gap:6px}
  .copy-script-btn{
    display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
    background:#7c3aed;color:#fff;border:none;border-radius:8px;
    font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
  }
  .copy-script-btn:hover{background:#6d28d9}
  .copy-script-btn.copied{background:#22c55e}
  .script-body{
    padding:16px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;
    font-size:13px;line-height:1.7;color:#e5e7eb;white-space:pre-wrap;
    word-break:break-word;max-height:400px;overflow-y:auto;
  }
  .script-body .s-label{color:#a78bfa;font-weight:700}
  .script-body .s-value{color:#34d399}
  .script-body .s-action{color:#fbbf24}
  .script-body .s-macro{color:#60a5fa;font-weight:700}
  .script-body .s-divider{color:#4b5563}

  /* Observação Interna */
  .obs-section{
    margin-top:14px;background:#1a1a2e;border-radius:12px;padding:0;
    overflow:hidden;border:1px solid #4a3f6b;
  }
  .obs-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 16px;background:#16213e;border-bottom:1px solid #4a3f6b;
  }
  .obs-header-title{font-size:13px;font-weight:700;color:#f59e0b;display:flex;align-items:center;gap:6px}
  .obs-label{
    display:inline-block;margin-bottom:8px;padding:4px 10px;
    background:rgba(245,158,11,.15);border-radius:6px;
    font-size:11px;font-weight:800;color:#f59e0b;letter-spacing:.5px;
  }
  .copy-obs-btn{
    display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
    background:#f59e0b;color:#1a1a2e;border:none;border-radius:8px;
    font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;
  }
  .copy-obs-btn:hover{background:#d97706}
  .copy-obs-btn.copied{background:#22c55e;color:#fff}
  .obs-body{
    padding:16px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;
    font-size:12.5px;line-height:1.7;color:#d1d5db;white-space:pre-wrap;
    word-break:break-word;max-height:350px;overflow-y:auto;
  }
  .obs-body .obs-placeholder{color:#f59e0b;font-weight:700;background:rgba(245,158,11,.1);padding:1px 4px;border-radius:3px}
  .obs-body .obs-macro-ref{color:#60a5fa;font-weight:600}

  .hidden{display:none}

  /* Rodapé de atualização */
  .version-badge{
    position:fixed;bottom:12px;left:12px;z-index:10;
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 12px;background:rgba(255,255,255,.85);
    backdrop-filter:blur(8px);border:1px solid #e8e5f0;
    border-radius:20px;font-size:11px;font-weight:600;
    color:#6b7280;box-shadow:0 1px 4px rgba(0,0,0,.04);
    transition:all .2s ease;cursor:default;
  }
  .version-badge:hover{color:#6d28d9;border-color:#c4b5fd;background:rgba(255,255,255,.95)}
  .version-badge .version-dot{
    width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0;
    box-shadow:0 0 0 2px rgba(34,197,94,.2);
  }
  @media (max-width:480px){
    .version-badge{font-size:10px;padding:5px 10px;bottom:8px;left:8px}
  }
</style>
</head>

function getNextStep(cs, v, a) {
  if (cs === "tipo_incidente") {
    if (["desacordo","pix_errado","cancelamento","boleto_consumo"].includes(v)) return null;
    if (v === "golpe") return "tipo_golpe";
    if (v === "chip_replay") return "decisao_chip_replay";
    return "decisao_ato";
  }
  if (cs === "decisao_chip_replay") return null;
  if (cs === "tipo_golpe") return "decisao_golpe";
  if (cs === "decisao_golpe") return v === "acatado" ? "motivo_acate_golpe" : "tipo_transacao_golpe";
  if (cs === "motivo_acate_golpe") return "transacao_financiada";
  if (cs === "tipo_transacao_golpe") {
    if (["whatsapp_golpe","pix_whatsapp_golpe","recarga_saque_golpe"].includes(v)) return "triangulacao";
    if (v === "nupay_golpe") return "golpe_nupay_tipo";
    if (v === "conta_nu_golpe") return "golpe_conta_nu_saldo";
    if (v === "misto_golpe") return "misto_tipos_golpe";
    return "status_recuperacao_golpe";
  }
  if (cs === "misto_tipos_golpe") return "status_recuperacao_golpe";
  if (cs === "status_recuperacao_golpe") return "triangulacao";
  if (cs === "golpe_conta_nu_saldo") return "triangulacao";
  if (cs === "golpe_nupay_tipo") return "golpe_nupay_decisao";
  if (cs === "golpe_nupay_decisao") return a.golpe_nupay_tipo === "pj_golpe" ? "golpe_nupay_pj_conta" : "golpe_pix_protegido";
  if (cs === "golpe_nupay_pj_conta") return "golpe_pix_protegido";
  if (cs === "golpe_pix_protegido") return "tem_crypto";
  if (cs === "decisao_ato") return v === "acatado" ? "vulnerabilidade_ato" : "tipo_transacao_negado";
  if (cs === "vulnerabilidade_ato") {
    if (a.decisao_ato === "acatado") return "transacao_financiada";
    if (v === "malware") return "malware_reincidente";
    return "tipo_transacao_negado";
  }
  if (cs === "malware_reincidente") return v === "sim" ? "transacao_financiada" : "tipo_transacao_negado";
  if (cs === "tipo_transacao_negado") {
    if (["whatsapp","pix_whatsapp","recarga_saque"].includes(v)) return null;
    if (v === "nupay") return "nupay_tipo";
    if (v === "misto") return "misto_tipos";
    return "status_recuperacao";
  }
  if (cs === "misto_tipos") return "status_recuperacao";
  if (cs === "nupay_tipo") return "nupay_decisao";
  if (cs === "nupay_decisao") return a.nupay_tipo === "pj" ? "nupay_pj_conta" : null;
  if (cs === "nupay_pj_conta") return null;
  if (cs === "status_recuperacao") return "transacao_financiada";
  if (cs === "transacao_financiada") return "triangulacao";
  if (cs === "triangulacao") {
    if (a.tipo_incidente === "golpe" && a.decisao_golpe === "negado") return "golpe_pix_protegido";
    if (a.tipo_incidente === "golpe" && a.decisao_golpe === "acatado") return "tem_crypto";
    return "tem_crypto";
  }
  if (cs === "tem_crypto") return null;
  return null;
}

function parseMistoTipos(raw, prefix) {
  // Convert "mx_pix,mx_carta" → ["pix","carta"] or "mgx_pix,mgx_carta" → ["gpix","gcarta"]
  if (!raw) return [];
  return raw.split(',').map(v => v.replace(prefix, ''));
}

function getMistoLabels(raw, stepKey) {
  if (!raw) return [];
  const selected = raw.split(',');
  const step = STEPS[stepKey];
  return selected.map(v => {
    const opt = step.options.find(o => o.value === v);
    return opt ? opt.label : v;
  });
}

}

function renderStep(stepKey, stepNum) {
  const s = STEPS[stepKey];
  const ans = answers[stepKey];
  const isMulti = s.multiSelect === true;
  let html = `<div class="step-card" id="step-${stepKey}">`;
  html += `<div class="step-header">`;
  html += `<div class="step-num ${ans ? 'done' : 'pending'}">${ans ? '✓' : stepNum}</div>`;
  html += `<div class="step-icon">${s.icon}</div>`;
  html += `<div class="step-title">${s.question}</div>`;
  html += `</div><div class="options">`;

  if (isMulti) {
    // Already confirmed? Show summary
    if (ans) {
      const selected = ans.split(',');
      s.options.forEach(opt => {
        const isChecked = selected.includes(opt.value);
        if (isChecked) {
          html += `<button class="option-btn multi checked" onclick="resetMultiSelect('${stepKey}')">`;
          html += `<span class="option-label">${opt.label}</span>`;
          html += `<div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
          html += `</button>`;
        }
      });
    } else {
      // Editing mode — show toggleable checkboxes
      if (!tempMultiSelect[stepKey]) tempMultiSelect[stepKey] = [];
      const temp = tempMultiSelect[stepKey];
      s.options.forEach(opt => {
        const isChecked = temp.includes(opt.value);
        html += `<button class="option-btn multi${isChecked ? ' checked' : ''}" onclick="toggleMulti('${stepKey}','${opt.value}')">`;
        html += `<span class="option-label">${opt.label}</span>`;
        if (opt.desc) html += `<span class="option-desc">${opt.desc}</span>`;
        html += `<div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>`;
        html += `</button>`;
      });
      const count = temp.length;
      html += `<p class="multi-hint">${count > 0 ? count + ' tipo(s) selecionado(s)' : 'Selecione ao menos 2 tipos'}</p>`;
      html += `<button class="confirm-multi-btn" onclick="confirmMulti('${stepKey}')" ${count < 2 ? 'disabled' : ''}>✓ Confirmar seleção</button>`;
    }
  } else {
    s.options.forEach(opt => {
      const sel = ans === opt.value ? ' selected' : '';
      html += `<button class="option-btn${sel}" onclick="selectOption('${stepKey}','${opt.value}')">`;
      html += `<span class="option-label">${opt.label}</span>`;
      if (opt.desc) html += `<span class="option-desc">${opt.desc}</span>`;
      html += `</button>`;
    });
  }
  html += `</div></div>`;
  return html;
}

  // ═══ CANCELAMENTO ═══
  else if (a.tipo_incidente === "cancelamento") {

function getObservacaoInterna(a) {
  // Determine which template to use based on decision

  // Cases that don't need observação interna
  if (["desacordo","pix_errado","cancelamento","boleto_consumo"].includes(a.tipo_incidente)) return null;

  // ACATADO → Reembolso Integral
  const isAcatado =
    (a.tipo_incidente === "ato" && a.decisao_ato === "acatado") ||
    (a.tipo_incidente === "golpe" && a.decisao_golpe === "acatado") ||
    (a.tipo_incidente === "chip_replay" && a.decisao_chip_replay === "acatado");

  if (isAcatado) {
    return {
      label: "CSI - Informação ao time externo - Reembolso Integral",
      text:
`Essa observação foi registrada pelo analista decisor do caso.

Seguiremos com o Reembolso Integral das transações.
XXX_TRANSAÇÃO_XXXX
XXX_TRANSAÇÃO_XXXX
XXX_TRANSAÇÃO_XXXX

Caso o cliente questione sobre o andamento da sua contestação envie a macro:
CSISTS04 - [CSI] Status do Incidente - Reembolso Integral`
    };
  }

  // NEGADO → determine recovery type
  // Check misto selections
  const mistoHas = (key, prefix, val) => a[key] ? a[key].split(',').some(v => v === prefix + val) : false;
  const mistoHasPix = mistoHas('misto_tipos','mx_','pix') || mistoHas('misto_tipos_golpe','mgx_','pix');
  const mistoHasOutra = mistoHas('misto_tipos','mx_','carta') || mistoHas('misto_tipos','mx_','boleto_nu') || mistoHas('misto_tipos_golpe','mgx_','carta') || mistoHas('misto_tipos_golpe','mgx_','boleto_nu');

  // Check if it's PIX
  const isPix =
    (a.tipo_transacao_negado === "pix") ||
    (a.tipo_transacao_golpe === "pix_golpe") ||
    mistoHasPix;

  // Check if it's other (carta, boleto, etc)
  const isOutra =
    (a.tipo_transacao_negado === "carta" || a.tipo_transacao_negado === "boleto_nu") ||
    (a.tipo_transacao_golpe === "carta_golpe" || a.tipo_transacao_golpe === "boleto_nu_golpe") ||
    (a.tipo_transacao_negado === "misto" && !mistoHasPix) ||
    (a.tipo_transacao_golpe === "misto_golpe" && !mistoHasPix) ||
    mistoHasOutra;

  // Check recovery status
  const hasRecovery =
    (a.status_recuperacao === "andamento" || a.status_recuperacao === "devolucao") ||
    (a.status_recuperacao_golpe === "andamento" || a.status_recuperacao_golpe === "devolucao");

  // Conta Nu with saldo = recovery in progress
  const contaNuComSaldo =
    (a.tipo_transacao_negado === "conta_nu" && (a.status_recuperacao === "andamento" || a.status_recuperacao === "devolucao")) ||
    (a.tipo_transacao_golpe === "conta_nu_golpe" && ["vermelho_saldo","amarelo_saldo","sem_reporte_saldo"].includes(a.golpe_conta_nu_saldo));

  // PIX with recovery
  if (isPix && hasRecovery) {
    return {
      label: "CSI - Informação ao time externo - Tentativa de recuperação [Somente PIX]",
      text:
`Essa observação foi registrada pelo analista decisor do caso.

Seguiremos com a Tentativa de Recuperação das transações:
XXX_TRANSAÇÃO_XXXX
XXX_TRANSAÇÃO_XXXX
XXX_TRANSAÇÃO_XXXX

As transações PIX a seguir, tem o seguinte resultado de recuperação:
XXX_TRANSAÇÃO_XXXX - Valor recuperado: R$XX.XX
XXX_TRANSAÇÃO_XXXX - Valor recuperado: R$XX.XX
XXX_TRANSAÇÃO_XXXX - Valor recuperado: R$XX.XX

Caso o cliente questione sobre o andamento da sua contestação, siga as orientações do card e utilize a macro: CSISTS06 - [CSI] Status do Incidente - Andamento da recuperação`
    };
  }

  // Outras transações with recovery (or Conta Nu com saldo)
  if ((isOutra && hasRecovery) || contaNuComSaldo) {
    return {
      label: "CSI - Informação ao time externo - Tentativa de recuperação [Outras transações]",
      text:
`Essa observação foi registrada pelo analista decisor do caso.

Seguiremos com a Tentativa de Recuperação das transações:
XXX_TRANSAÇÃO_XXXX
XXX_TRANSAÇÃO_XXXX
XXX_TRANSAÇÃO_XXXX

Caso o cliente questione sobre o andamento da sua contestação, transfira o caso para o time de CSI.

Devido a algumas informações importantes para um posicionamento assertivo não estarem disponíveis ao time de atendimento externo, não passe nenhum posicionamento, apenas direcione ao time responsável.

[Email]
CSIOBS00 - CSI - Transferência para o time interno
[Chat e Telefone]
CSISTS02 - [CSI] Status do Incidente - Finalizado`
    };
  }

  // Default: Sem recuperação
  return {
    label: "CSI - Informação ao time externo - Sem recuperação",
    text:
`Essa observação foi registrada pelo analista decisor do caso.

Não foi possível recuperar o valor transferido das seguintes transações:
XXX_TRANSAÇÃO_XXXX
XXX_TRANSAÇÃO_XXXX
XXX_TRANSAÇÃO_XXXX

Caso o cliente questione sobre o andamento da sua contestação, siga as orientações do card e utilize a macro: CSISTS06 - [CSI] Status do Incidente - Andamento da recuperação`
  };
}

function renderResult(result) {
  let html = `<div class="result-header">`;
  html += `<div class="result-icon">✅</div>`;
  html += `<div class="result-title">Macros Recomendadas</div>`;
  html += `</div><div class="macros-list">`;
  result.macros.forEach((m, i) => {
    html += `<div class="macro-badge ${m.type}"><div class="macro-top">`;
    html += `<span class="macro-type ${m.type}">${m.type === 'apendice' ? 'APÊNDICE' : 'PRINCIPAL'}</span>`;
    html += `<div class="macro-code-wrap"><span class="macro-code">${m.code}</span>`;
    html += `<button class="copy-btn" id="copy-btn-${i}" onclick="copyCode('${m.code}',${i})" title="Copiar código">`;
    html += `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    html += `</button></div></div><span class="macro-name">${m.name}</span></div>`;
  });
  html += `</div>`;

  // Script de Análise
  const scriptText = generateScript(answers, result);
  const scriptHtml = scriptText
    .replace(/^(ANÁLISE:)/gm, '<span class="s-label">$1</span>')
    .replace(/^(Decisão:)/gm, '<span class="s-label">$1</span>')
    .replace(/^(Macro\(s\):)/gm, '<span class="s-label">$1</span>')
    .replace(/^(Verificação de segurança:|Verificação de vulnerabilidades:|Verificação de comprometimento:|Motivo do acate:|Transações:|Status da recuperação:|Ações realizadas:)/gm, '<span class="s-action">$1</span>')
    .replace(/(ACATADO[^<\n]*)/g, '<span class="s-value">$1</span>')
    .replace(/(NEGADO[^<\n]*)/g, '<span style="color:#f87171;font-weight:700">$1</span>')
    .replace(/(INVÁLIDO[^<\n]*)/g, '<span style="color:#fbbf24;font-weight:700">$1</span>')
    .replace(/(CANCELADO)/g, '<span style="color:#fbbf24;font-weight:700">$1</span>')
    .replace(/(CSI\w+)/g, '<span class="s-macro">$1</span>');

  html += `<div class="script-section">`;
  html += `<div class="script-header">`;
  html += `<span class="script-header-title">📄 Script de Análise</span>`;
  html += `<button class="copy-script-btn" id="copy-script-btn" onclick="copyScript()">📋 Copiar tudo</button>`;
  html += `</div>`;
  html += `<div class="script-body" id="script-body">${scriptHtml}</div>`;
  html += `</div>`;

  // Observação Interna (BPO)
  const obs = getObservacaoInterna(answers);
  if (obs) {
    const obsHtml = obs.text
      .replace(/(XXX_TRANSAÇÃO_XXXX[^\n]*)/g, '<span class="obs-placeholder">$1</span>')
      .replace(/(R\$XX\.XX)/g, '<span class="obs-placeholder">$1</span>')
      .replace(/(CSIOBS\d+|CSISTS\d+)([^\n<]*)/g, '<span class="obs-macro-ref">$1$2</span>');

    html += `<div class="obs-section">`;
    html += `<div class="obs-header">`;
    html += `<span class="obs-header-title">📨 Observação Interna (BPO)</span>`;
    html += `<button class="copy-obs-btn" id="copy-obs-btn" onclick="copyObs()">📋 Copiar</button>`;
    html += `</div>`;
    html += `<div class="obs-body">`;
    html += `<span class="obs-label">${obs.label}</span>\n\n`;
    html += obsHtml;
    html += `</div></div>`;
  }

  if (result.notes.length) {
    html += `<div class="notes"><div class="notes-title">⚠️ Lembretes importantes:</div>`;
    result.notes.forEach(n => { html += `<div class="note-item">${n}</div>`; });
    html += `</div>`;
  }
  if (result.registro && result.registro.length) {
    html += `<div class="registro-info"><div class="notes-title">📝 Registro no Marte/Pelúcio:</div>`;
    result.registro.forEach(n => { html += `<div class="note-item">${n}</div>`; });
    html += `</div>`;
  }
  return html;
}

function copyCode(code, idx) {
  navigator.clipboard.writeText(code).then(() => {
    const btn = document.getElementById('copy-btn-' + idx);
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    showToast(`✅ "${code}" copiado!`);
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    }, 2000);
  });
}

function copyScript() {
  const result = getMacroResult(answers);
  const text = generateScript(answers, result);
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-script-btn');
    btn.textContent = '✅ Copiado!';
    btn.classList.add('copied');
    showToast('✅ Script de análise copiado!');
    setTimeout(() => {
      btn.textContent = '📋 Copiar tudo';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function copyObs() {
  const obs = getObservacaoInterna(answers);
  if (!obs) return;
  navigator.clipboard.writeText(obs.text).then(() => {
    const btn = document.getElementById('copy-obs-btn');
    btn.textContent = '✅ Copiado!';
    btn.classList.add('copied');
    showToast('✅ Observação interna copiada!');
    setTimeout(() => {
      btn.textContent = '📋 Copiar';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function render() {
  const container = document.getElementById('steps-container');
  const resultEl = document.getElementById('result-section');
  const resetBtn = document.getElementById('reset-btn');
  let html = '';
  stepHistory.forEach((sk, i) => { html += renderStep(sk, i + 1); });
  container.innerHTML = html;
  const lastStep = stepHistory[stepHistory.length - 1];
  const lastAnswer = answers[lastStep];
  if (lastAnswer) {
    const next = getNextStep(lastStep, lastAnswer, answers);
    if (!next) {
      const result = getMacroResult(answers);
      resultEl.innerHTML = renderResult(result);
      resultEl.className = 'result';
      setTimeout(() => resultEl.scrollIntoView({behavior:'smooth',block:'start'}), 150);
    } else { resultEl.className = 'hidden'; resultEl.innerHTML = ''; }
  } else { resultEl.className = 'hidden'; resultEl.innerHTML = ''; }
  resetBtn.className = Object.keys(answers).length > 0 ? 'reset-btn' : 'reset-btn hidden';
}

function toggleMulti(stepKey, value) {
  if (!tempMultiSelect[stepKey]) tempMultiSelect[stepKey] = [];
  const arr = tempMultiSelect[stepKey];
  const idx = arr.indexOf(value);
  if (idx === -1) arr.push(value);
  else arr.splice(idx, 1);
  render();
}

function confirmMulti(stepKey) {
  const arr = tempMultiSelect[stepKey];
  if (!arr || arr.length < 2) return;
  const value = arr.join(',');
  const stepIdx = stepHistory.indexOf(stepKey);
  const newAnswers = {};
  stepHistory.slice(0, stepIdx).forEach(s => { newAnswers[s] = answers[s]; });
  newAnswers[stepKey] = value;
  answers = newAnswers;
  stepHistory = stepHistory.slice(0, stepIdx + 1);
  const next = getNextStep(stepKey, value, answers);
  if (next) stepHistory.push(next);
  delete tempMultiSelect[stepKey];
  render();
  if (next) setTimeout(() => { const el = document.getElementById('step-' + next); if (el) el.scrollIntoView({behavior:'smooth',block:'center'}); }, 100);
}

function resetMultiSelect(stepKey) {
  const stepIdx = stepHistory.indexOf(stepKey);
  const newAnswers = {};
  stepHistory.slice(0, stepIdx).forEach(s => { newAnswers[s] = answers[s]; });
  answers = newAnswers;
  stepHistory = stepHistory.slice(0, stepIdx + 1);
  tempMultiSelect[stepKey] = [];
  render();
}

function selectOption(stepKey, value) {
  const stepIdx = stepHistory.indexOf(stepKey);
  const newAnswers = {};
  stepHistory.slice(0, stepIdx).forEach(s => { newAnswers[s] = answers[s]; });
  newAnswers[stepKey] = value;
  answers = newAnswers;
  stepHistory = stepHistory.slice(0, stepIdx + 1);
  const next = getNextStep(stepKey, value, answers);
  if (next) stepHistory.push(next);
  render();
  if (next) setTimeout(() => { const el = document.getElementById('step-' + next); if (el) el.scrollIntoView({behavior:'smooth',block:'center'}); }, 100);
}

function resetAll() {
  answers = {};
  stepHistory = ["tipo_incidente"];
  tempMultiSelect = {};
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
